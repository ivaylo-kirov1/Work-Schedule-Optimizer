# single-origin: serve the SPA + proxy /api to the backend (no CORS)
upstream backend {
    server backend:8000;  # compose service name
}

server {
    listen 8080;
    server_name _;

    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: unknown paths -> index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long-cache hashed assets; index.html stays uncached
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # no trailing slash on proxy_pass -> full path preserved (/api/foo -> backend/api/foo)
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # optional debug surface: backend health + API docs 
    location ~ ^/(health|docs|redoc|openapi\.json)$ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
